<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGKRINIS | Tech Prog</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #0a0d14;
            --card-bg: #111522;
            --accent-blue: #00e6ff;
            --accent-green: #00ff66;
            --text-main: #ffffff;
            --text-muted: #6b7c96;
            --border-color: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            letter-spacing: -0.02em;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            width: 100%;
            max-width: 380px;
            padding: 40px 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .logo-area {
            margin-bottom: 25px;
        }

        .brand-title {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-main);
            text-transform: uppercase;
        }

        .brand-tag {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent-green);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 4px;
        }

        .description {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 35px;
            font-weight: 400;
        }

        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 16px 20px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .link-item i {
            font-size: 1.1rem;
            width: 25px;
            text-align: left;
            color: var(--text-muted);
            transition: color 0.2s ease;
        }

        /* Premium Minimal Hover */
        .link-item:hover {
            background: rgba(0, 230, 255, 0.03);
            border-color: var(--accent-blue);
            transform: translateY(-1px);
        }

        .link-item:hover i {
            color: var(--accent-blue);
        }

        .link-text {
            flex-grow: 1;
            text-align: left;
            margin-left: 10px;
        }

        .arrow-icon {
            font-size: 0.8rem !important;
            opacity: 0.3;
        }

        .link-item:hover .arrow-icon {
            opacity: 1;
            transform: translateX(2px);
        }

        .footer {
            margin-top: 35px;
            font-size: 0.75rem;
            color: var(--text-muted);
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-area">
            <div class="brand-title">EGKRINIS</div>
            <div class="brand-tag">Tech Prog</div>
        </div>
        
        <p class="description">Digital Skills &amp; Automated Solutions</p>

        <div class="links-grid">
            <a href="https://github.com/egkrinis" target="_blank" class="link-item">
                <i class="fab fa-github"></i>
                <span class="link-text">GitHub Portfolio</span>
                <i class="fas fa-chevron-right arrow-icon"></i>
            </a>

            <a href="mailto:your-email@domain.com" class="link-item">
                <i class="fas fa-envelope"></i>
                <span class="link-text">Επικοινωνία</span>
                <i class="fas fa-chevron-right arrow-icon"></i>
            </a>

            <a href="#" class="link-item">
                <i class="fas fa-terminal"></i>
                <span class="link-text">Services &amp; Scripts</span>
                <i class="fas fa-chevron-right arrow-icon"></i>
            </a>
        </div>

        <div class="footer">
            &copy; 2026 EGKRINIS
        </div>
    </div>

</body>
</html>
