<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGKRINIS | Digital Business Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f111a;
            --card-bg: #1e2235;
            --accent-color: #00e6ff;
            --text-color: #ffffff;
            --text-secondary: #8a99ad;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            padding: 30px 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-color), #7928ca);
            margin: 0 auto 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: white;
            box-shadow: 0 0 20px rgba(0, 230, 255, 0.2);
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .subtitle {
            color: var(--accent-color);
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bio {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-link {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-color);
            text-decoration: none;
            padding: 14px 20px;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn-link i {
            font-size: 1.2rem;
            margin-right: 15px;
            width: 25px;
            text-align: center;
            color: var(--accent-color);
        }

        .btn-link:hover {
            background: var(--accent-color);
            color: #000;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 230, 255, 0.3);
        }

        .btn-link:hover i {
            color: #000;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="profile-img">E</div>
        
        <h1>EGKRINIS</h1>
        <div class="subtitle">Elementary Prog</div>
        
        <p class="bio">
            Custom Scripting • Android Automation • Data Scraping & Security Solutions.
        </p>

        <div class="links-container">
            <a href="https://github.com/egkrinis" target="_blank" class="btn-link">
                <i class="fab fa-github"></i> GitHub Portfolio
            </a>

            <a href="https://www.upwork.com/freelancers/egkrinis" target="_blank" class="btn-link">
                <i class="fas fa-briefcase"></i> Hire Me on Upwork
            </a>

            <a href="mailto:contact@egkrinis.com" class="btn-link">
                <i class="fas fa-envelope"></i> Contact Email
            </a>
            
            <a href="#" class="btn-link">
                <i class="fas fa-user-plus"></i> Save Contact (vCard)
            </a>
        </div>

        <div class="footer">
            &copy; 2026 Elementary Prog. All rights reserved.
        </div>
    </div>

</body>
</html>
