<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGKRINIS | Tech Prog</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #050811;
            --card-bg: rgba(10, 20, 38, 0.7);
            --neon-blue: #00d2ff;
            --neon-green: #00ff66;
            --text-light: #ffffff;
            --text-gray: #8fa0dd;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 50% 50%, rgba(0, 210, 255, 0.15) 0px, transparent 50%),
                linear-gradient(rgba(18, 24, 41, 0.6) 1px, transparent 1px),
                linear-gradient(90deg, rgba(18, 24, 41, 0.6) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card-container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 210, 255, 0.3);
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.15), inset 0 0 15px rgba(0, 210, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .card-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-green));
        }

        .brand-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--text-light);
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.6);
            margin-bottom: 5px;
        }

        .brand-subtitle {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--neon-green);
            letter-spacing: 4px;
            text-transform: uppercase;
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 4px 0;
            display: inline-block;
            margin-bottom: 15px;
        }

        .tagline {
            color: var(--text-gray);
            font-size: 0.9rem;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 16px 20px;
            color: var(--text-light);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-link i {
            font-size: 1.2rem;
            color: var(--neon-blue);
            transition: all 0.3s ease;
        }

        .btn-link:hover {
            background: rgba(0, 210, 255, 0.08);
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
            transform: translateY(-2px);
        }

        .btn-link:hover i {
            color: var(--neon-green);
            transform: scale(1.1);
        }

        .footer {
            margin-top: 30px;
            font-size: 0.75rem;
            color: var(--text-gray);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <h1 class="brand-name">EGKRINIS</h1>
        <div class="brand-subtitle">Tech Prog</div>
        <p class="tagline">Digital Skills &amp; Automated Solutions</p>

        <div class="links-wrapper">
            <a href="https://github.com/egkrinis" target="_blank" class="btn-link">
                <span><i class="fab fa-github" style="margin-right: 10px;"></i> GitHub Portfolio</span>
                <i class="fas fa-chevron-right"></i>
            </a>

            <a href="mailto:your-email@domain.com" class="btn-link">
                <span><i class="fas fa-envelope" style="margin-right: 10px;"></i> Επικοινωνία (Email)</span>
                <i class="fas fa-chevron-right"></i>
            </a>

            <a href="#" target="_blank" class="btn-link">
                <span><i class="fas fa-code" style="margin-right: 10px;"></i> Υπηρεσίες &amp; Projects</span>
                <i class="fas fa-chevron-right"></i>
            </a>
        </div>

        <div class="footer">
            &copy; 2026 EGKRINIS. All rights reserved.
        </div>
    </div>

</body>
</html>
